name: Publish images

# Builds and pushes a Docker image per CHANGED service to GitHub Container
# Registry (ghcr.io). Runs only on main so feature branches don't publish.
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write # required to push to ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service: ['services/auth-service/**', 'libs/**']
            booking-service: ['services/booking-service/**', 'libs/**']
            catalog-service: ['services/catalog-service/**', 'libs/**']
            user-service: ['services/user-service/**', 'libs/**']
            notification-service: ['services/notification-service/**', 'libs/**']
            payment-service: ['services/payment-service/**', 'libs/**']
            client-app: ['apps/client-app/**']
            provider-app: ['apps/provider-app/**']

  publish:
    needs: changes
    if: needs.changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    name: publish (${{ matrix.package }})
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build context
        id: loc
        run: |
          if [ -d "services/${{ matrix.package }}" ]; then
            echo "dir=services/${{ matrix.package }}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=apps/${{ matrix.package }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.loc.outputs.dir }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/airserviz-${{ matrix.package }}:latest
            ghcr.io/${{ steps.owner.outputs.name }}/airserviz-${{ matrix.package }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
