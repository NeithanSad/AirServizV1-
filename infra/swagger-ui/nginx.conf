# Serves one static Swagger UI page with a dropdown that switches between
# the 6 microservices' OpenAPI specs. Each /specs/<name>-json proxies to the
# service's own NestJS Swagger JSON endpoint (same-origin, avoids CORS).
#
# host.docker.internal works whether each service runs on the host via
# `npm run start:dev` OR as a container via `docker compose --profile
# services up` — either way its port is published on the host machine.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /specs/auth-json {
    proxy_pass http://host.docker.internal:3001/api/docs-json;
  }
  location = /specs/booking-json {
    proxy_pass http://host.docker.internal:3002/api/docs-json;
  }
  location = /specs/notification-json {
    proxy_pass http://host.docker.internal:3003/api/docs-json;
  }
  location = /specs/catalog-json {
    proxy_pass http://host.docker.internal:3004/api/docs-json;
  }
  location = /specs/user-json {
    proxy_pass http://host.docker.internal:3005/api/docs-json;
  }
  location = /specs/payment-json {
    proxy_pass http://host.docker.internal:3006/api/docs-json;
  }
}
