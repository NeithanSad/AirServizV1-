# AirServiz — pipeline de Logstash
#
# Entrada: los microservicios NestJS envían logs JSON (pino) por TCP :5000
# (transporte pino-socket, una línea JSON por evento).
# Salida: índice diario en Elasticsearch → airserviz-logs-YYYY.MM.dd
input {
  tcp {
    port  => 5000
    codec => json_lines
  }
}

filter {
  # pino emite epoch-ms en "time" → úsalo como @timestamp real del evento
  date {
    match  => ["time", "UNIX_MS"]
    target => "@timestamp"
    remove_field => ["time"]
  }

  # pino usa niveles numéricos (30=info…); etiqueta legible para Kibana.
  # (pino no permite formatters.level con múltiples transport targets,
  # así que la traducción vive aquí y no en los servicios.)
  translate {
    source      => "[level]"
    target      => "[level_name]"
    dictionary  => { "10" => "trace" "20" => "debug" "30" => "info"
                     "40" => "warn"  "50" => "error" "60" => "fatal" }
    fallback    => "unknown"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "airserviz-logs-%{+YYYY.MM.dd}"
  }
}
