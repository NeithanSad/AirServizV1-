version: "3.9"

# =========================================================
# AirServiz - Sprint 2
# Servicios: API Gateway (Kong) | Bus de mensajería (Kafka)
#            Cache (Redis) | Capa de datos (Postgres x3)
#            auth-service | booking-service | notification-service
# =========================================================

networks:
  airserviz-net:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  postgres-users-data:
  postgres-bookings-data:
  postgres-catalog-data:
  postgres-payments-data:
  redis-data:
  grafana-data:

services:

  # ---------------------------------------------------
  # API GATEWAY - Kong (DB-less / declarative)
  # Rutas, JWT y rate-limit se cargan desde infra/kong/kong.yaml
  # ---------------------------------------------------
  kong:
    image: kong:3.6
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      # kong.local.yaml routes to host.docker.internal — matches the normal
      # local-dev workflow where microservices run on the host via
      # `npm run start:dev`, not as containers. Use kong.yaml (Docker service
      # names) instead when running the full stack via `--profile services`.
      KONG_DECLARATIVE_CONFIG: /kong/kong.local.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # Admin API in read-only mode (DB-less can't persist writes anyway)
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ../kong:/kong:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux Docker fallback
    ports:
      - "8000:8000"   # Proxy (tráfico público)
      - "8443:8443"   # Proxy SSL
      - "8001:8001"   # Admin API (read-only)
    networks:
      - airserviz-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Lightweight read-only GUI: static page + nginx proxy to Kong Admin API
  # (same-origin, avoids CORS). See infra/kong/dashboard/.
  kong-dashboard:
    image: nginx:1.27-alpine
    container_name: kong-dashboard
    depends_on:
      - kong
    volumes:
      - ../kong/dashboard/html:/usr/share/nginx/html:ro
      - ../kong/dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"
    networks:
      - airserviz-net

  # Unified Swagger UI: one page, dropdown to switch between the 6 services'
  # OpenAPI specs. Each service still serves its own /api/docs — this just
  # aggregates them so you don't need 6 browser tabs. See infra/swagger-ui/.
  swagger-ui:
    image: nginx:1.27-alpine
    container_name: airserviz-swagger-ui
    volumes:
      - ../swagger-ui/html:/usr/share/nginx/html:ro
      - ../swagger-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8089:80"
    networks:
      - airserviz-net
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux Docker fallback

  # ---------------------------------------------------
  # BUS DE MENSAJERÍA - Kafka + Zookeeper
  # ---------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: airserviz-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - airserviz-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: airserviz-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - airserviz-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: airserviz-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: airserviz
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # OBSERVABILIDAD - Prometheus + Grafana
  # ---------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: airserviz-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - airserviz-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: airserviz-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # CACHE - Redis
  # ---------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: airserviz-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # CAPA DE BASE DE DATOS (por servicio - Database per Service)
  # ---------------------------------------------------
  postgres-users:
    image: postgres:15-alpine
    container_name: postgres-users
    environment:
      POSTGRES_USER: users_admin
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: users_db
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - airserviz-net

  postgres-bookings:
    image: postgres:15-alpine
    container_name: postgres-bookings
    environment:
      POSTGRES_USER: bookings_admin
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: bookings_db
    volumes:
      - postgres-bookings-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - airserviz-net

  postgres-catalog:
    image: postgres:15-alpine
    container_name: postgres-catalog
    environment:
      POSTGRES_USER: catalog_admin
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: catalog_db
    volumes:
      - postgres-catalog-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - airserviz-net

  postgres-payments:
    image: postgres:15-alpine
    container_name: postgres-payments
    environment:
      POSTGRES_USER: payments_admin
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: payments_db
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # MICROSERVICIOS (placeholders - reemplazar 'build' cuando
  # exista el Dockerfile de cada servicio)
  # ---------------------------------------------------
  user-service:
    build:
      context: ../../services/user-service
    container_name: user-service
    depends_on:
      - postgres-users
    environment:
      PORT: 3005
      DB_HOST: postgres-users
      DB_PORT: 5432
      DB_NAME: users_db
      DB_USER: users_admin
      DB_PASS: change_me
    ports:
      - "3005:3005"
    networks:
      - airserviz-net
    profiles: ["services"]   # docker compose --profile services up

  catalog-service:
    build:
      context: ../../services/catalog-service
    container_name: catalog-service
    depends_on:
      - postgres-catalog
      - redis
    environment:
      PORT: 3004
      DB_HOST: postgres-catalog
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: catalog_admin
      DB_PASS: change_me
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3004:3004"
    networks:
      - airserviz-net
    profiles: ["services"]

  booking-service:
    build:
      context: ../../services/booking-service
    container_name: booking-service
    depends_on:
      - postgres-bookings
      - kafka
      - redis
    environment:
      DB_HOST: postgres-bookings
      DB_PORT: 5432
      DB_NAME: bookings_db
      DB_USER: bookings_admin
      DB_PASS: change_me
      KAFKA_BROKER: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
      REDIS_HOST: redis
    ports:
      - "3002:3002"
    networks:
      - airserviz-net
    profiles: ["services"]

  auth-service:
    build:
      context: ../../services/auth-service
    container_name: auth-service
    depends_on:
      - postgres-users
    environment:
      PORT: 3001
      DB_HOST: postgres-users
      DB_PORT: 5432
      DB_NAME: users_db
      DB_USER: users_admin
      DB_PASS: change_me
      JWT_SECRET: change_me_to_a_real_secret_32chars
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
    ports:
      - "3001:3001"
    networks:
      - airserviz-net
    profiles: ["services"]

  notification-service:
    build:
      context: ../../services/notification-service
    container_name: notification-service
    depends_on:
      - kafka
    environment:
      PORT: 3003
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: notification-service-group
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
    ports:
      - "3003:3003"
    networks:
      - airserviz-net
    profiles: ["services"]

  payment-service:
    build:
      context: ../../services/payment-service
    container_name: payment-service
    depends_on:
      - postgres-payments
      - kafka
    environment:
      PORT: 3006
      DB_HOST: postgres-payments
      DB_PORT: 5432
      DB_NAME: payments_db
      DB_USER: payments_admin
      DB_PASS: change_me
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: payment-service-group
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
      STRIPE_WEBHOOK_SECRET: whsec_sim_dev_secret
    ports:
      - "3006:3006"
    networks:
      - airserviz-net
    profiles: ["services"]
