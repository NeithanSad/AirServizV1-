version: "3.9"


networks:
  airserviz-net:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  postgres-users-data:
  postgres-bookings-data:
  postgres-catalog-data:
  postgres-payments-data:
  redis-data:
  grafana-data:
  es-data:
  # Kong's declarative config, rendered at boot with the real JWT secret
  # injected. Deliberately a volume and not a bind mount: the rendered file
  # contains a live secret and must never land in the working tree.
  kong-config:

services:

  # ---------------------------------------------------
  # Renderiza la config declarativa de Kong inyectando JWT_SECRET.
  # Contenedor efímero: corre, escribe en el volumen kong-config y termina.
  # Si el secreto falta o es inválido, sale con error y Kong NO arranca
  # (fail-closed) — ver infra/kong/render-config.sh.
  # ---------------------------------------------------
  kong-config-init:
    image: alpine:3.20
    container_name: kong-config-init
    environment:
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET — ejecuta scripts/rotate-secrets.sh desde la raíz del repo}
    volumes:
      - ../kong:/templates:ro
      - kong-config:/rendered
    command: ["sh", "/templates/render-config.sh"]
    restart: "no"
    # Solo lee una plantilla y escribe un archivo: no tiene nada que hacer en
    # la red. Sin esto además acabaría en la red `default`, que ningún otro
    # servicio usa.
    network_mode: none

  # ---------------------------------------------------
  # API GATEWAY - Kong (DB-less / declarative)
  # Rutas, JWT y rate-limit se cargan desde infra/kong/kong.yaml.template,
  # renderizado por kong-config-init al volumen kong-config.
  # ---------------------------------------------------
  kong:
    image: kong:3.6
    container_name: kong-gateway
    depends_on:
      kong-config-init:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: "off"
      # kong.local.yaml routes to host.docker.internal — matches the normal
      # local-dev workflow where microservices run on the host via
      # `npm run start:dev`, not as containers. Use kong.yaml (Docker service
      # names) instead when running the full stack via `--profile services`.
      KONG_DECLARATIVE_CONFIG: /kong/kong.local.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # Admin API in read-only mode (DB-less can't persist writes anyway)
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - kong-config:/kong:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux Docker fallback
    ports:
      - "8000:8000"   # Proxy (tráfico público)
      - "8443:8443"   # Proxy SSL
      - "8001:8001"   # Admin API (read-only)
    networks:
      - airserviz-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Lightweight read-only GUI: static page + nginx proxy to Kong Admin API
  # (same-origin, avoids CORS). See infra/kong/dashboard/.
  kong-dashboard:
    image: nginx:1.27-alpine
    container_name: kong-dashboard
    depends_on:
      - kong
    volumes:
      - ../kong/dashboard/html:/usr/share/nginx/html:ro
      - ../kong/dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"
    networks:
      - airserviz-net

  # Unified Swagger UI: one page, dropdown to switch between the 6 services'
  # OpenAPI specs. Each service still serves its own /api/docs — this just
  # aggregates them so you don't need 6 browser tabs. See infra/swagger-ui/.
  swagger-ui:
    image: nginx:1.27-alpine
    container_name: airserviz-swagger-ui
    volumes:
      - ../swagger-ui/html:/usr/share/nginx/html:ro
      - ../swagger-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8089:80"
    networks:
      - airserviz-net
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux Docker fallback

  # ---------------------------------------------------
  # BUS DE MENSAJERÍA - Kafka + Zookeeper
  # ---------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: airserviz-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - airserviz-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: airserviz-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - airserviz-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: airserviz-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: airserviz
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # OBSERVABILIDAD - Prometheus + Grafana
  # ---------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: airserviz-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - airserviz-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: airserviz-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # LOGS CENTRALIZADOS - Stack ELK
  # Los servicios envían logs JSON (pino) → Logstash TCP :5000
  # → Elasticsearch → Kibana (http://localhost:5601)
  # ---------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: airserviz-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"   # dev only — no auth
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - airserviz-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.1
    container_name: airserviz-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      # pipeline única definida en ./pipeline — sin config extra
      XPACK_MONITORING_ENABLED: "false"
    volumes:
      - ../observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5000:5000"   # entrada TCP json_lines (pino-socket)
    networks:
      - airserviz-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    container_name: airserviz-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # CACHE - Redis
  # ---------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: airserviz-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # CAPA DE BASE DE DATOS (por servicio - Database per Service)
  # ---------------------------------------------------
  postgres-users:
    image: postgres:15-alpine
    container_name: postgres-users
    environment:
      POSTGRES_USER: users_admin
      POSTGRES_PASSWORD: ${POSTGRES_USERS_PASSWORD:?falta POSTGRES_USERS_PASSWORD en .env}
      POSTGRES_DB: users_db
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - airserviz-net

  postgres-bookings:
    image: postgres:15-alpine
    container_name: postgres-bookings
    environment:
      POSTGRES_USER: bookings_admin
      POSTGRES_PASSWORD: ${POSTGRES_BOOKINGS_PASSWORD:?falta POSTGRES_BOOKINGS_PASSWORD en .env}
      POSTGRES_DB: bookings_db
    volumes:
      - postgres-bookings-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - airserviz-net

  postgres-catalog:
    image: postgres:15-alpine
    container_name: postgres-catalog
    environment:
      POSTGRES_USER: catalog_admin
      POSTGRES_PASSWORD: ${POSTGRES_CATALOG_PASSWORD:?falta POSTGRES_CATALOG_PASSWORD en .env}
      POSTGRES_DB: catalog_db
    volumes:
      - postgres-catalog-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - airserviz-net

  postgres-payments:
    image: postgres:15-alpine
    container_name: postgres-payments
    environment:
      POSTGRES_USER: payments_admin
      POSTGRES_PASSWORD: ${POSTGRES_PAYMENTS_PASSWORD:?falta POSTGRES_PAYMENTS_PASSWORD en .env}
      POSTGRES_DB: payments_db
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - airserviz-net

  # ---------------------------------------------------
  # MICROSERVICIOS 
  # ---------------------------------------------------
  user-service:
    build:
      context: ../../services/user-service
    container_name: user-service
    depends_on:
      - postgres-users
    environment:
      PORT: 3005
      DB_HOST: postgres-users
      DB_PORT: 5432
      DB_NAME: users_db
      DB_USER: users_admin
      DB_PASS: ${POSTGRES_USERS_PASSWORD:?falta POSTGRES_USERS_PASSWORD en .env}
      LOG_TCP_HOST: logstash
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET en .env}
    ports:
      - "3005:3005"
    networks:
      - airserviz-net
    profiles: ["services"]   # docker compose --profile services up

  catalog-service:
    build:
      context: ../../services/catalog-service
    container_name: catalog-service
    depends_on:
      - postgres-catalog
      - redis
    environment:
      PORT: 3004
      DB_HOST: postgres-catalog
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: catalog_admin
      DB_PASS: ${POSTGRES_CATALOG_PASSWORD:?falta POSTGRES_CATALOG_PASSWORD en .env}
      LOG_TCP_HOST: logstash
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET en .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # AWS — para invocar la Lambda image-optimizer (subida de imagen de servicio).
      # Las credenciales se interpolan desde el entorno (o desde infra/docker-compose/.env,
      # que está en .gitignore). Si están vacías, el resto del catálogo funciona igual;
      # solo POST /services/media devolvería 503.
      AWS_REGION: us-east-1
      IMAGE_OPTIMIZER_FN: airserviz-image-optimizer
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    ports:
      - "3004:3004"
    networks:
      - airserviz-net
    profiles: ["services"]

  booking-service:
    build:
      context: ../../services/booking-service
    container_name: booking-service
    depends_on:
      - postgres-bookings
      - kafka
      - redis
    environment:
      DB_HOST: postgres-bookings
      DB_PORT: 5432
      DB_NAME: bookings_db
      DB_USER: bookings_admin
      DB_PASS: ${POSTGRES_BOOKINGS_PASSWORD:?falta POSTGRES_BOOKINGS_PASSWORD en .env}
      LOG_TCP_HOST: logstash
      # Verifica los JWT él mismo para derivar la identidad del usuario. Kong
      # valida en el borde, pero un proceso dentro de la red podría llegar
      # directo a este puerto y forjar cabeceras.
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET en .env}
      KAFKA_BROKER: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
      REDIS_HOST: redis
    ports:
      - "3002:3002"
    networks:
      - airserviz-net
    profiles: ["services"]

  auth-service:
    build:
      context: ../../services/auth-service
    container_name: auth-service
    depends_on:
      - postgres-users
    environment:
      PORT: 3001
      DB_HOST: postgres-users
      DB_PORT: 5432
      DB_NAME: users_db
      DB_USER: users_admin
      DB_PASS: ${POSTGRES_USERS_PASSWORD:?falta POSTGRES_USERS_PASSWORD en .env}
      LOG_TCP_HOST: logstash
      # Mismo valor que consume kong-config-init: ambos leen esta variable del
      # .env, así que Kong y auth-service no pueden desincronizarse.
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET en .env}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
    ports:
      - "3001:3001"
    networks:
      - airserviz-net
    profiles: ["services"]

  notification-service:
    build:
      context: ../../services/notification-service
    container_name: notification-service
    depends_on:
      - kafka
    environment:
      PORT: 3003
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: notification-service-group
      LOG_TCP_HOST: logstash
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET en .env}
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
    ports:
      - "3003:3003"
    networks:
      - airserviz-net
    profiles: ["services"]

  payment-service:
    build:
      context: ../../services/payment-service
    container_name: payment-service
    depends_on:
      - postgres-payments
      - kafka
    environment:
      PORT: 3006
      DB_HOST: postgres-payments
      DB_PORT: 5432
      DB_NAME: payments_db
      DB_USER: payments_admin
      DB_PASS: ${POSTGRES_PAYMENTS_PASSWORD:?falta POSTGRES_PAYMENTS_PASSWORD en .env}
      LOG_TCP_HOST: logstash
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET en .env}
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: payment-service-group
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?falta STRIPE_WEBHOOK_SECRET en .env}
    ports:
      - "3006:3006"
    networks:
      - airserviz-net
    profiles: ["services"]

  # ---------------------------------------------------
  # FRONTENDS (nginx — sirven el build de producción y proxean
  # /api al gateway Kong, igual que en K8s)
  # ---------------------------------------------------
  client-app:
    build:
      context: ../../apps/client-app
    container_name: client-app
    depends_on:
      - kong
    ports:
      - "5173:80"
    networks:
      - airserviz-net
    profiles: ["services"]

  provider-app:
    build:
      context: ../../apps/provider-app
    container_name: provider-app
    depends_on:
      - kong
    ports:
      - "5174:80"
    networks:
      - airserviz-net
    profiles: ["services"]

  admin-dashboard:
    build:
      context: ../../apps/admin-dashboard
    container_name: admin-dashboard
    depends_on:
      - kong
    ports:
      - "5175:80"
    networks:
      - airserviz-net
    profiles: ["services"]
