# Database-per-service: four independent Postgres instances.
# Each is a Deployment + ClusterIP Service + PVC (1Gi, default StorageClass).
# ─────────────────────────────────────────────────────────────────────────────
# postgres-users  (auth-service + user-service share users_db)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-users-pvc
  namespace: airserviz
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-users
  namespace: airserviz
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: postgres-users }
  template:
    metadata:
      labels: { app: postgres-users }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: users_admin }
            - { name: POSTGRES_DB, value: users_db }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: airserviz-secrets, key: DB_PASSWORD }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "users_admin"] }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-users-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-users
  namespace: airserviz
spec:
  selector: { app: postgres-users }
  ports: [{ port: 5432, targetPort: 5432 }]
---
