# Kong API gateway (DB-less) for Kubernetes.
#
# The ConfigMap below embeds infra/kong/kong.yaml.template so `kubectl apply -f`
# works out of the box. If you edit the template, regenerate this ConfigMap:
#   kubectl create configmap kong-config -n airserviz \
#     --from-file=kong.yaml.template=infra/kong/kong.yaml.template \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# A ConfigMap is NOT a place for secrets, so the JWT secret is not written here:
# the marker __JWT_SECRET__ is substituted at pod start by the initContainer of
# the Deployment below, reading JWT_SECRET from the `airserviz-secrets` Secret.
# Same design as docker-compose, where infra/kong/render-config.sh does the job.
#
# In-cluster upstream hostnames (auth-service, booking-service, …) match the
# Service names in this namespace, so the same declarative config used by
# docker-compose works unchanged here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: airserviz
data:
  kong.yaml.template: |
    _format_version: "3.0"
    _transform: true
    services:
      - name: auth-service
        host: auth-service
        port: 3001
        protocol: http
        path: /auth
        routes:
          - name: auth-route
            paths: ["/api/auth"]
            strip_path: true
      - name: booking-service
        host: booking-service
        port: 3002
        protocol: http
        path: /orders
        routes:
          - name: booking-route
            paths: ["/api/orders"]
            strip_path: true
            plugins:
              - name: jwt
                config:
                  claims_to_verify: ["exp"]
      - name: catalog-service
        host: catalog-service
        port: 3004
        protocol: http
        path: /services
        routes:
          - name: catalog-route
            paths: ["/api/services"]
            strip_path: true
      - name: user-service
        host: user-service
        port: 3005
        protocol: http
        path: /profiles
        routes:
          - name: user-route-read
            paths: ["/api/profiles"]
            methods: ["GET"]
            strip_path: true
          - name: user-route-write
            paths: ["/api/profiles"]
            methods: ["PUT", "POST", "PATCH", "DELETE"]
            strip_path: true
            plugins:
              - name: jwt
                config:
                  claims_to_verify: ["exp"]
      - name: notification-service
        host: notification-service
        port: 3003
        protocol: http
        path: /notifications
        routes:
          - name: notification-route
            paths: ["/api/notifications"]
            strip_path: true
      - name: payment-service
        host: payment-service
        port: 3006
        protocol: http
        path: /payments
        routes:
          - name: payment-webhook-route
            paths: ["/api/payments/webhook"]
            strip_path: true
          - name: payment-route
            paths: ["/api/payments"]
            strip_path: true
            plugins:
              - name: jwt
                config:
                  claims_to_verify: ["exp"]
    consumers:
      - username: airserviz-app
        jwt_secrets:
          - key: airserviz-auth
            algorithm: HS256
            secret: __JWT_SECRET__
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          hour: 1000
          policy: local
          limit_by: consumer
          fault_tolerant: true
      - name: correlation-id
        config:
          header_name: X-Correlation-Id
          generator: uuid
          echo_downstream: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: airserviz
spec:
  replicas: 1
  selector:
    matchLabels: { app: kong }
  template:
    metadata:
      labels: { app: kong }
    spec:
      # Renderiza la config declarativa inyectando el secreto desde el Secret.
      # La lógica es la misma que infra/kong/render-config.sh (usado por
      # docker-compose); se repite en línea para que `kubectl apply -f` funcione
      # sin montar scripts externos. Si tocas una, revisa la otra.
      initContainers:
        - name: render-kong-config
          image: alpine:3.20
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: airserviz-secrets, key: JWT_SECRET }
          command: ["sh", "-euc"]
          args:
            - |
              len=$(printf '%s' "$JWT_SECRET" | wc -c)
              if [ "$len" -lt 32 ]; then
                echo "JWT_SECRET mide $len bytes; el mínimo para HS256 es 32." >&2
                echo "Crea el Secret fuera de git: kubectl create secret generic airserviz-secrets ..." >&2
                exit 1
              fi
              # Sustitución literal con index()/substr(): ni sed ni gsub, que
              # interpretan & y \ en el reemplazo y mutarían el secreto.
              awk -v m='__JWT_SECRET__' '
                BEGIN { s = ENVIRON["JWT_SECRET"] }
                {
                  line = $0; out = ""
                  while ((p = index(line, m)) > 0) {
                    out = out substr(line, 1, p - 1) s
                    line = substr(line, p + length(m))
                  }
                  print out line
                }
              ' /templates/kong.yaml.template > /kong/kong.yaml
              # Fail-closed: una sustitución que no ocurre dejaría a Kong
              # validando tokens contra un secreto literal público.
              if grep -q '__JWT_SECRET__' /kong/kong.yaml; then
                echo "la sustitución de __JWT_SECRET__ falló; no se arranca Kong" >&2
                exit 1
              fi
              echo "kong.yaml renderizado"
          volumeMounts:
            - { name: kong-template, mountPath: /templates, readOnly: true }
            - { name: kong-rendered, mountPath: /kong }
      containers:
        - name: kong
          image: kong:3.6
          env:
            - { name: KONG_DATABASE, value: "off" }
            - { name: KONG_DECLARATIVE_CONFIG, value: /kong/kong.yaml }
            - { name: KONG_PROXY_ACCESS_LOG, value: /dev/stdout }
            - { name: KONG_PROXY_ERROR_LOG, value: /dev/stderr }
            - { name: KONG_ADMIN_LISTEN, value: "0.0.0.0:8001" }
          ports:
            - { containerPort: 8000 }
            - { containerPort: 8001 }
          volumeMounts:
            - { name: kong-rendered, mountPath: /kong, readOnly: true }
          readinessProbe:
            exec: { command: ["kong", "health"] }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        # Plantilla versionada (sin secretos) …
        - name: kong-template
          configMap: { name: kong-config }
        # … y el resultado renderizado, que sí contiene el secreto: emptyDir
        # para que viva solo en la vida del pod y nunca se persista.
        - name: kong-rendered
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: airserviz
spec:
  type: NodePort
  selector: { app: kong }
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      nodePort: 30080
