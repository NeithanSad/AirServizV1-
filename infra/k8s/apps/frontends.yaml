# Client + provider + admin SPAs (nginx). Exposed via NodePort for local access.
#   client-app      → http://localhost:30081
#   provider-app    → http://localhost:30082
#   admin-dashboard → http://localhost:30083
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-app
  namespace: airserviz
  labels: { app: client-app }
spec:
  replicas: 1
  selector:
    matchLabels: { app: client-app }
  template:
    metadata:
      labels: { app: client-app }
    spec:
      containers:
        - name: client-app
          image: ghcr.io/neithansad/airserviz-client-app:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: client-app
  namespace: airserviz
spec:
  type: NodePort
  selector: { app: client-app }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-app
  namespace: airserviz
  labels: { app: provider-app }
spec:
  replicas: 1
  selector:
