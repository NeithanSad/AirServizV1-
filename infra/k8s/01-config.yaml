# Shared non-secret config + the SHAPE of the secrets (never their values).
#
# ⚠️  The Secret below is a placeholder on purpose: the values are too short to
#     be valid, so Kong's render initContainer refuses to start rather than
#     silently accepting a weak key. Applying this file as-is will NOT bring up
#     a working gateway — that is the intended fail-closed behaviour.
#
#     Create the real Secret out-of-band, never in git:
#
#       kubectl create secret generic airserviz-secrets -n airserviz \
#         --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#         --from-literal=DB_PASSWORD="$(openssl rand -hex 32)" \
#         --from-literal=STRIPE_WEBHOOK_SECRET="whsec_sim_$(openssl rand -hex 32)"
#
#     For a real cluster prefer sealed-secrets or the external-secrets operator
#     so the manifest stays declarative without the values ever touching git.
#
#     JWT_SECRET must be the same value auth-service signs with; both read it
#     from this Secret, which is what keeps them in sync.
apiVersion: v1
kind: ConfigMap
metadata:
  name: airserviz-config
  namespace: airserviz
data:
  KAFKA_BROKER: "kafka:9092"
  KAFKAJS_NO_PARTITIONER_WARNING: "1"
  # DB port is uniform inside the cluster (each Postgres listens on 5432)
  DB_PORT: "5432"
---
apiVersion: v1
kind: Secret
metadata:
  name: airserviz-secrets
  namespace: airserviz
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
  STRIPE_WEBHOOK_SECRET: "REPLACE_ME"
