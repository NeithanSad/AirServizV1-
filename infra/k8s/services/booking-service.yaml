apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: airserviz
  labels: { app: booking-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: booking-service }
  template:
    metadata:
      labels: { app: booking-service }
    spec:
      containers:
        - name: booking-service
          image: ghcr.io/neithansad/airserviz-booking-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3002 }]
          env:
            - { name: PORT, value: "3002" }
            - { name: DB_HOST, value: postgres-bookings }
            - { name: DB_PORT, value: "5432" }
            - { name: DB_NAME, value: bookings_db }
            - { name: DB_USER, value: bookings_admin }
            - name: DB_PASS
              valueFrom:
                secretKeyRef: { name: airserviz-secrets, key: DB_PASSWORD }
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef: { name: airserviz-config, key: KAFKA_BROKER }
            - { name: REDIS_HOST, value: redis }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            tcpSocket: { port: 3002 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3002 }
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: airserviz
spec:
  selector: { app: booking-service }
  ports: [{ port: 3002, targetPort: 3002 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: booking-service
  namespace: airserviz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: booking-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
