apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: airserviz
  labels: { app: payment-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: payment-service }
  template:
    metadata:
      labels: { app: payment-service }
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/neithansad/airserviz-payment-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3006 }]
          env:
            - { name: PORT, value: "3006" }
            - { name: DB_HOST, value: postgres-payments }
            - { name: DB_PORT, value: "5432" }
            - { name: DB_NAME, value: payments_db }
            - { name: DB_USER, value: payments_admin }
            - name: DB_PASS
              valueFrom:
                secretKeyRef: { name: airserviz-secrets, key: DB_PASSWORD }
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef: { name: airserviz-config, key: KAFKA_BROKER }
            - { name: KAFKA_GROUP_ID, value: payment-service-group }
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef: { name: airserviz-secrets, key: STRIPE_WEBHOOK_SECRET }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            tcpSocket: { port: 3006 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3006 }
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: airserviz
spec:
  selector: { app: payment-service }
  ports: [{ port: 3006, targetPort: 3006 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service
  namespace: airserviz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
