apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: airserviz
  labels: { app: auth-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/neithansad/airserviz-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3001 }]
          env:
            - { name: PORT, value: "3001" }
            - { name: DB_HOST, value: postgres-users }
            - { name: DB_PORT, value: "5432" }
            - { name: DB_NAME, value: users_db }
            - { name: DB_USER, value: users_admin }
            - name: DB_PASS
              valueFrom:
                secretKeyRef: { name: airserviz-secrets, key: DB_PASSWORD }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: airserviz-secrets, key: JWT_SECRET }
            - { name: JWT_ACCESS_EXPIRES, value: "15m" }
            - { name: JWT_REFRESH_EXPIRES, value: "7d" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            tcpSocket: { port: 3001 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3001 }
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: airserviz
spec:
  selector: { app: auth-service }
  ports: [{ port: 3001, targetPort: 3001 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service
  namespace: airserviz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
