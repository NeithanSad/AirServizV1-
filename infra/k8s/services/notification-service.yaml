apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: airserviz
  labels: { app: notification-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service }
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/neithansad/airserviz-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3003 }]
          env:
            - { name: PORT, value: "3003" }
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef: { name: airserviz-config, key: KAFKA_BROKER }
            - { name: KAFKA_GROUP_ID, value: notification-service-group }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            tcpSocket: { port: 3003 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3003 }
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: airserviz
spec:
  selector: { app: notification-service }
  ports: [{ port: 3003, targetPort: 3003 }]
---
# Notification-service holds in-memory state + SSE connections, so scaling it
# horizontally would fragment the feed. HPA scales on CPU but keeps max low.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service
  namespace: airserviz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
