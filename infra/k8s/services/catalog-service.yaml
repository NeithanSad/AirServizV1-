apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: airserviz
  labels: { app: catalog-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: catalog-service }
  template:
    metadata:
      labels: { app: catalog-service }
    spec:
      containers:
        - name: catalog-service
          image: ghcr.io/neithansad/airserviz-catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3004 }]
          env:
            - { name: PORT, value: "3004" }
            - { name: DB_HOST, value: postgres-catalog }
            - { name: DB_PORT, value: "5432" }
            - { name: DB_NAME, value: catalog_db }
            - { name: DB_USER, value: catalog_admin }
            - { name: REDIS_HOST, value: redis }
            - { name: REDIS_PORT, value: "6379" }
            - name: DB_PASS
              valueFrom:
                secretKeyRef: { name: airserviz-secrets, key: DB_PASSWORD }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            tcpSocket: { port: 3004 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3004 }
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: airserviz
spec:
  selector: { app: catalog-service }
  ports: [{ port: 3004, targetPort: 3004 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-service
  namespace: airserviz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
