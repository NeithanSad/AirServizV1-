# Serves the static Kong dashboard and proxies /admin/ to Kong's Admin API
# (same-origin from the browser's point of view — avoids CORS entirely,
# since Kong's Admin API does not send Access-Control-Allow-Origin headers).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /admin/ {
    proxy_pass http://kong:8001/;
    proxy_set_header Host $host;
  }
}
